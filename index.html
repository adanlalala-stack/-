<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>张岭设计工作室 · 室内设计需求问卷</title>
<style>
  :root {
    --bg: #fafaf8;
    --card-bg: #ffffff;
    --text: #2c2c2c;
    --text-light: #6b6b6b;
    --accent: #c2855b;
    --accent-dark: #a06d48;
    --accent-light: #f5ebe3;
    --progress-bg: #e8e4df;
    --border: #e8e4df;
    --shadow: 0 2px 16px rgba(0,0,0,0.06);
    --radius: 12px;
    --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ===== PROGRESS BAR ===== */
  .progress-wrapper {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
  }
  .progress-inner {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--progress-bg);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c2855b, #d4a57a);
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }
  .progress-text {
    font-size: 13px;
    color: var(--text-light);
    white-space: nowrap;
    font-weight: 500;
    min-width: 48px;
    text-align: right;
  }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }

  /* ===== MAIN CONTAINER ===== */
  .main-container {
    max-width: 720px;
    margin: 0 auto;
    padding: 100px 24px 60px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== CARD ===== */
  .question-card {
    background: var(--card-bg);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 48px 44px 40px;
    width: 100%;
    animation: fadeSlideIn 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid var(--border);
  }
  .question-card.no-anim { animation: none; }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .question-card.out { animation: fadeSlideOut 0.25s ease-in forwards; }

  .question-number {
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .question-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .question-subtitle {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 32px;
  }

  /* ===== OPTIONS ===== */
  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    list-style: none;
  }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 16px 20px;
    background: #fafaf8;
    border: 2px solid transparent;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    color: var(--text);
    transition: all 0.2s ease;
    text-align: left;
    font-family: inherit;
  }
  .option-btn {
    touch-action: manipulation;
  }
  .option-btn:hover {
    background: var(--accent-light);
    border-color: var(--accent);
  }
  .option-btn:active {
    transform: scale(0.98);
    transition: transform 0.1s ease;
  }
  .option-btn.selected {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent-dark);
    font-weight: 500;
  }
  .option-radio {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s ease;
  }
  .option-btn.selected .option-radio {
    border-color: var(--accent);
    background: var(--accent);
  }
  .option-btn.selected .option-radio::after {
    content: '';
    width: 8px; height: 8px;
    background: white;
    border-radius: 50%;
  }

  /* Checkbox style */
  .option-check {
    width: 22px; height: 22px;
    border-radius: 4px;
    border: 2px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s ease;
  }
  .option-btn.selected .option-check {
    border-color: var(--accent);
    background: var(--accent);
  }
  .option-btn.selected .option-check::after {
    content: '✓';
    color: white;
    font-size: 13px;
    font-weight: bold;
  }

  /* ===== TEXT INPUT ===== */
  .text-input {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
    color: var(--text);
    background: #fafaf8;
    transition: border-color 0.2s ease;
    outline: none;
  }
  .text-input:focus {
    border-color: var(--accent);
    background: white;
  }
  .text-input::placeholder { color: #bfbfbf; }

  /* ===== BUTTONS ===== */
  .btn-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 36px;
    gap: 14px;
  }
  .btn {
    padding: 14px 32px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover {
    background: var(--accent-dark);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(194,133,91,0.3);
  }
  .btn-primary:disabled {
    background: #d9d9d9;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  .btn-secondary {
    background: transparent;
    color: var(--text-light);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover {
    background: #f5f5f5;
    color: var(--text);
  }

  /* ===== WELCOME SCREEN ===== */
  .welcome-card {
    text-align: center;
    padding: 64px 44px;
  }
  .welcome-logo {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--accent-dark);
    margin-bottom: 8px;
  }
  .welcome-tagline {
    font-size: 15px;
    color: var(--text-light);
    max-width: 420px;
    margin: 0 auto 40px;
    line-height: 1.7;
  }
  .welcome-stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 44px;
  }
  .welcome-stat {
    text-align: center;
  }
  .welcome-stat-num {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
  }
  .welcome-stat-label {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 2px;
  }
  .start-btn {
    padding: 18px 56px;
    font-size: 18px;
  }

  /* ===== COMPLETION SCREEN ===== */
  .completion-card { text-align: center; padding: 56px 44px; }
  .completion-icon {
    font-size: 56px;
    margin-bottom: 20px;
  }
  .completion-title {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .completion-text {
    color: var(--text-light);
    margin-bottom: 32px;
    line-height: 1.7;
  }
  .summary-section {
    text-align: left;
    background: #fafaf8;
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 20px;
    max-height: 360px;
    overflow-y: auto;
  }
  .summary-section h4 {
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 10px;
    margin-top: 16px;
  }
  .summary-section h4:first-child { margin-top: 0; }
  .summary-section p {
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 4px;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    body {
      font-size: 15px;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }
    .main-container {
      padding: 80px 10px 36px;
      align-items: flex-start;
    }
    .progress-wrapper {
      padding: 10px 14px;
    }
    .progress-inner { gap: 8px; }
    .section-label { font-size: 10px; letter-spacing: 0.04em; }
    .progress-text { font-size: 11px; min-width: 36px; }
    .question-card {
      padding: 28px 18px 24px;
      border-radius: 14px;
    }
    .question-card.welcome-card { padding: 40px 20px; }
    .question-card.completion-card { padding: 36px 18px; }
    .question-number { font-size: 11px; }
    .question-title { font-size: 17px; line-height: 1.45; }
    .question-subtitle { font-size: 13px; margin-bottom: 24px; }
    .option-btn {
      padding: 14px 14px;
      font-size: 15px;
      border-radius: 10px;
      gap: 10px;
      min-height: 48px;
    }
    .option-radio, .option-check { width: 20px; height: 20px; }
    .btn-row {
      flex-direction: column-reverse;
      gap: 10px;
      margin-top: 28px;
    }
    .btn {
      width: 100%;
      text-align: center;
      padding: 14px 20px;
      font-size: 15px;
      min-height: 48px;
    }
    .welcome-stats { gap: 16px; margin-bottom: 32px; }
    .welcome-stat-num { font-size: 26px; }
    .welcome-logo { font-size: 24px; }
    .welcome-tagline { font-size: 14px; }
    .start-btn { padding: 16px 40px; font-size: 16px; }
    .completion-title { font-size: 22px; }
    .completion-icon { font-size: 44px; }
    .summary-section { max-height: 280px; padding: 16px; }
    .summary-section h4 { font-size: 13px; }
    .summary-section p { font-size: 13px; }
    .text-input { font-size: 16px; padding: 12px 14px; }
  }

  /* iOS safe area support */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .main-container {
      padding-bottom: calc(36px + env(safe-area-inset-bottom));
    }
  }

  /* Prevent auto-zoom on iOS */
  @media screen and (-webkit-min-device-pixel-ratio: 0) {
    input[type="text"], input[type="text"]:focus {
      font-size: 16px !important;
    }
  }
</style>
</head>
<body>

<!-- Progress Bar -->
<div class="progress-wrapper" id="progressBar" style="display:none">
  <div class="progress-inner">
    <span class="section-label" id="sectionLabel"></span>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span class="progress-text" id="progressText">0%</span>
  </div>
</div>

<!-- Main Container -->
<div class="main-container" id="mainContainer"></div>

<script>
// ===== QUESTION DATA =====
const sections = [
  {
    id: 'welcome',
    type: 'welcome'
  },
  {
    id: 'basic',
    title: '基础信息',
    questions: [
      { id: 'q1_1', title: '我们如何称呼您？', subtitle: '请选择称谓并填写您的姓名', type: 'text', placeholder: '请输入您的姓名', prefix: 'prefix', prefixLabel: '称谓', prefixOptions: ['先生', '女士'] },
      { id: 'q1_2', title: '项目名称及所在城市区域', type: 'text', placeholder: '例如：北京朝阳区' },
      { id: 'q1_3', title: '项目户型及建筑面积', type: 'multi-text', fields: [
        { key: 'houseType', placeholder: '户型（如：三室两厅）', label: '户型' },
        { key: 'area', placeholder: '建筑面积（㎡）', label: '建筑面积' }
      ]},
      { id: 'q1_4', title: '项目朝向', type: 'radio', options: ['东', '南', '西', '北', '其它'] },
      { id: 'q1_5', title: '房屋结构形式', subtitle: '您可以咨询销售或开发商代表确定', type: 'radio', options: ['框架剪力墙结构', '砖混结构', '木结构', '钢结构', '钢混框架结构', '砖木结构', '轻钢结构', '其它结构'] },
      { id: 'q1_6', title: '您对房子装修整体单平米投入的初步预期', subtitle: '施工+主材+设备+软装+电器', type: 'radio', options: ['5000-8000元/平米', '8000-12000元/平米', '12000-15000元/平米', '15000-20000元/平米', '20000元/平米及以上'] },
      { id: 'q1_7', title: '目前房子的归属状态', type: 'radio', options: ['准备购买', '正在购买中，未完成过户', '已购买，过户已完成'] },
      { id: 'q1_8', title: '房子是现房还是期房？', type: 'choice-text', options: ['现房', '期房'], textLabel: '如果是期房，交房时间' },
      { id: 'q1_9', title: '房子使用倾向', type: 'radio', options: ['第一居所', '第二居所', '度假', '养老', '会所', '投资', '婚房', '其他商业用途'] },
    ]
  },
  {
    id: 'members',
    title: '家庭成员',
    questions: [
      { id: 'q2_1', title: '家庭常住成员', type: 'checkbox', options: ['男主人', '女主人', '男方老人', '女方老人', '工人', '管家', '司机'], hasExtra: true, extraPlaceholder: '如有其它居住成员请说明' },
      { id: 'q2_2', title: '孩子信息', subtitle: '请勾选并填写孩子的姓名和年龄', type: 'child-info' },
      { id: 'q2_3', title: '您的住宅是什么类型的建筑？', type: 'radio', options: ['独栋', '类独栋', '双拼', '联排', '叠拼', '平墅', '花园洋房', '单层公寓', '合院', '复式'] },
      { id: 'q2_4', title: '房屋内现有设备', type: 'checkbox', options: ['空调', '地暖', '新风', '智能', '水处理', '锅炉', '储水罐', '污水提升泵', '电梯', '地源热泵系统', '空气源热泵系统', '太阳能', '燃气表', '消火栓', '喷淋', '烟感', '安防'] },
    ]
  },
  {
    id: 'renovation',
    title: '改造需求',
    questions: [
      { id: 'q3_1', title: '首层入户门是否需要更换？', type: 'radio', options: ['是', '否'] },
      { id: 'q3_2', title: '车库入户门是否需要更换？', type: 'radio', options: ['是', '否'] },
      { id: 'q3_3', title: '所有外窗是否考虑全部更换？', type: 'radio', options: ['是', '否'] },
      { id: 'q3_4', title: '是否需要在家养宠物？', type: 'text', placeholder: '如有请说明宠物种类' },
      { id: 'q3_5', title: '扩建需求', type: 'checkbox', options: ['首层扩建', '地下空间扩建', '封阳台或封露台', '挑空封楼板'] },
      { id: 'q3_6', title: '目前对房子非常不满意的地方', type: 'text', placeholder: '请说明' },
    ]
  },
  {
    id: 'entry',
    title: '玄关厅',
    questions: [
      { id: 'q4_1', title: '玄关厅储物要求', type: 'checkbox', options: ['拖鞋', '男鞋', '女鞋', '儿童鞋', '短衣', '长衣', '雨具', '伴手礼', '高尔夫球包', '潜水服', '篮球/足球', '网球/羽毛球', '婴儿车', '滑雪雪具', '小型行李箱', '大型行李箱', '儿童驾驶玩具车', '轮椅', '快递存放区', '工具箱'], hasExtra: true, extraPlaceholder: '其他储物需求' },
    ]
  },
  {
    id: 'reception',
    title: '会客及交流空间',
    questions: [
      { id: 'q5_1', title: '平常有什么样的会客需求？', type: 'checkbox', options: ['家庭聚会', '工作及商务接待', '朋友来访', '邻居来访', '小朋友聚会', '不接待客人', '家庭私教上门'], hasExtra: true, extraPlaceholder: '其他' },

      { id: 'q5_6', title: '会展示艺术品或收藏品吗？', type: 'radio', options: ['有', '暂时没有'], hasExtra: true, extraPlaceholder: '收藏品类别' },
      { id: 'q5_7', title: '需要设置茶室以及专业的喝茶工具吗？', type: 'radio', options: ['需要', '不需要'] },
      { id: 'q5_8', title: '是否需要亲子空间？', type: 'radio', options: ['需要', '不需要'] },

      { id: 'q5_11', title: '此空间有无其他特殊功能需求？', type: 'text', placeholder: '请填写' },

  },
  {
    id: 'dining',
    title: '餐厅空间',
    questions: [
      { id: 'q6_1', title: '对于餐厅空间的形式，您更喜欢？', type: 'radio', options: ['开放式餐厅', '独立空间式餐厅'] },
      { id: 'q6_2', title: '平时在家多少人用餐？', type: 'radio-group', groups: [
        { label: '日常', options: ['2~4', '4~6', '4~8', '8人以上'] },
        { label: '宴请', options: ['6~8', '8~10', '10~15', '15人以上'] },
        { label: '节日', options: ['6~8', '8~10', '10~15', '15人以上'] }
      ]},
      { id: 'q6_3', title: '您及家人喜欢用什么形式的餐桌？', type: 'radio', options: ['圆桌', '长方形桌'] },
      { id: 'q6_4', title: '餐厅是否需要电视？', type: 'radio', options: ['是', '否'] },
      { id: 'q6_5', title: '对餐厅空间有什么储物要求？', type: 'checkbox', options: ['书柜', '酒柜', '展示柜', '餐边柜'], hasExtra: true, extraPlaceholder: '其他需求' },
      { id: 'q6_6', title: '日常生活中您的孩子会与您经常一起用餐吗？', type: 'radio', options: ['是', '否'] },
      { id: 'q6_7', title: '是否需要儿童专用用餐区？', type: 'radio', options: ['是', '否'] },
      { id: 'q6_8', title: '是否需要带有休闲功能的等餐区或备餐区？', type: 'radio', options: ['是', '否'] },
      { id: 'q6_9', title: '餐厅是否需要增加壁炉？', type: 'radio', options: ['是', '否'] },
      { id: 'q6_10', title: '您及家人生活中，经常在家吃火锅吗？', type: 'radio', options: ['是', '否'] },
      { id: 'q6_11', title: '您及家人饮食习惯更倾向于？', type: 'radio', options: ['中餐', '西餐', '中餐居多，偶尔做西餐', '西餐居多，偶尔做中餐'] },
    ]
  },
  {
    id: 'kitchen',
    title: '厨房空间',

// ===== STATE =====
let currentSectionIdx = 0;
let currentQuestionIdx = 0;
let answers = {};
let currentAnswer = null; // single-select value
let currentMultiAnswer = []; // multi-select values
let currentTextAnswer = '';
let currentMultiTextAnswer = {};
let currentPrefixAnswer = '';
let currentChildInfo = [];
let currentRadioGroupAnswer = {};

// ===== FLATTEN ALL QUESTIONS =====
let allQuestions = [];
sections.forEach(s => {
  if (s.questions) {
    s.questions.forEach(q => {
      allQuestions.push({ sectionId: s.id, sectionTitle: s.title, ...q });
    });
  }
});

// ===== NAVIGATION =====
function showSectionLabel() {
  const q = allQuestions[currentQuestionIdx];
  const section = sections.find(s => s.id === q.sectionId);
  document.getElementById('sectionLabel').textContent = section ? section.title : '';
}

function updateProgress() {
  const total = allQuestions.length;
  const pct = Math.round((currentQuestionIdx / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = pct + '%';
}

function showProgress() {
  document.getElementById('progressBar').style.display = 'block';
}

function hideProgress() {
  document.getElementById('progressBar').style.display = 'none';
}

// ===== ANSWER COLLECTION =====
function saveCurrentAnswer(q) {
  if (q.type === 'checkbox') {
    answers[q.id] = [...currentMultiAnswer];
    if (currentExtraText) answers[q.id + '__extra'] = currentExtraText;
  } else if (q.type === 'multi-text') {
    answers[q.id] = {...currentMultiTextAnswer};
  } else if (q.type === 'radio-group') {
    answers[q.id] = {...currentRadioGroupAnswer};
  } else if (q.type === 'child-info') {
    answers[q.id] = [...currentChildInfo];
  } else if (q.type === 'choice-text') {
    answers[q.id] = { choice: currentAnswer, text: currentExtraText };
  } else if (q.type === 'text') {
    answers[q.id] = currentTextAnswer;
    if (currentPrefixAnswer) answers[q.id + '__prefix'] = currentPrefixAnswer;
  } else {
    answers[q.id] = currentAnswer;
    if (currentExtraText) answers[q.id + '__extra'] = currentExtraText;
  }
}

function loadCurrentAnswer(q) {
  const saved = answers[q.id];
  if (q.type === 'checkbox') {
    currentMultiAnswer = Array.isArray(saved) ? [...saved] : [];
    currentExtraText = answers[q.id + '__extra'] || '';
  } else if (q.type === 'multi-text') {
    currentMultiTextAnswer = (saved && typeof saved === 'object') ? {...saved} : {};
  } else if (q.type === 'radio-group') {
    currentRadioGroupAnswer = (saved && typeof saved === 'object') ? {...saved} : {};
  } else if (q.type === 'child-info') {
    currentChildInfo = Array.isArray(saved) ? [...saved] : [];
  } else if (q.type === 'choice-text') {
    currentAnswer = (saved && saved.choice) ? saved.choice : null;
    currentExtraText = (saved && saved.text) ? saved.text : '';
  } else {
    currentAnswer = (saved && typeof saved === 'string') ? saved : null;
    currentExtraText = answers[q.id + '__extra'] || '';
    currentPrefixAnswer = answers[q.id + '__prefix'] || '';
  }
}

let currentExtraText = '';

// ===== RENDER =====
function clearAnswerState() {
  currentAnswer = null;
  currentMultiAnswer = [];
  currentTextAnswer = '';
  currentMultiTextAnswer = {};
  currentPrefixAnswer = '';
  currentChildInfo = [];
  currentExtraText = '';
  currentRadioGroupAnswer = {};
}

function renderQuestion(q, idx, animate) {
  const container = document.getElementById('mainContainer');
  loadCurrentAnswer(q);

  const isLast = idx >= allQuestions.length - 1;
  const section = sections.find(s => s.id === q.sectionId);
  const qNum = idx + 1;
  const animClass = animate ? '' : ' no-anim';

  let html = `<div class="question-card${animClass}">`;
  html += `<div class="question-number">${section ? section.title : ''} · 第 ${qNum}/${allQuestions.length} 题</div>`;
  html += `<div class="question-title">${q.title}</div>`;
  if (q.subtitle) html += `<div class="question-subtitle">${q.subtitle}</div>`;

  if (q.type === 'radio' || q.type === 'choice-text') {
    html += `<div class="options-list" id="optList">`;
    (q.options || []).forEach(opt => {
      const sel = currentAnswer === opt ? ' selected' : '';
      html += `<button class="option-btn${sel}" data-value="${escapeHtml(opt)}">
        <span class="option-radio"></span>${opt}
      </button>`;
    });
    html += '</div>';
    if (q.hasExtra && currentAnswer && currentAnswer !== '否' && currentAnswer !== '没有' && currentAnswer !== '暂时没有' && currentAnswer !== '不需要') {
      html += `<input class="text-input" id="extraInput" style="margin-top:12px" placeholder="${q.extraPlaceholder || '请说明'}" value="${escapeHtml(currentExtraText)}">`;
    } else if (q.type === 'choice-text' && currentAnswer === '期房') {
      html += `<input class="text-input" id="extraInput" style="margin-top:12px" placeholder="${q.textLabel || '请说明'}" value="${escapeHtml(currentExtraText)}">`;
    } else if (q.hasExtra || q.type === 'choice-text') {
      html += '<div id="extraSlot"></div>';
    }

  } else if (q.type === 'checkbox') {
    html += `<div class="options-list" id="optList">`;
    (q.options || []).forEach(opt => {
      const sel = currentMultiAnswer.includes(opt) ? ' selected' : '';
      html += `<button class="option-btn${sel}" data-value="${escapeHtml(opt)}">
        <span class="option-check"></span>${opt}
      </button>`;
    });
    html += '</div>';
    if (q.hasExtra) {
      html += `<input class="text-input" id="extraInput" style="margin-top:12px" placeholder="${q.extraPlaceholder || '其他需求请填写'}" value="${escapeHtml(currentExtraText)}">`;
    }

  } else if (q.type === 'text') {
    if (q.prefix) {
      html += `<div style="margin-bottom:8px;font-size:14px;color:var(--text-light)">${q.prefixLabel || '称谓'}</div>`;
      html += '<div class="options-list" style="flex-direction:row;margin-bottom:14px" id="prefixList">';
      (q.prefixOptions || []).forEach(opt => {
        const sel = currentPrefixAnswer === opt ? ' selected' : '';
        html += `<button class="option-btn${sel}" data-value="${escapeHtml(opt)}" style="flex:1;justify-content:center">
          <span class="option-radio"></span>${opt}
        </button>`;
      });
      html += '</div>';
    }
    html += `<input class="text-input" id="textInput" placeholder="${q.placeholder || '请输入'}" value="${escapeHtml(currentTextAnswer)}">`;

  } else if (q.type === 'multi-text') {
    html += '<div style="display:flex;flex-direction:column;gap:12px">';
    (q.fields || []).forEach(f => {
      const val = currentMultiTextAnswer[f.key] || '';
      html += `<div>
        <label style="font-size:13px;color:var(--text-light);display:block;margin-bottom:4px">${f.label}</label>
        <input class="text-input field-input" data-key="${f.key}" placeholder="${f.placeholder}" value="${escapeHtml(val)}">
      </div>`;
    });
    html += '</div>';

  } else if (q.type === 'radio-group') {
    (q.groups || []).forEach(g => {
      html += `<div style="margin-bottom:16px">
        <div style="font-size:14px;color:var(--accent);font-weight:600;margin-bottom:8px">${g.label}</div>
        <div class="options-list" style="flex-direction:row;flex-wrap:wrap;gap:8px" data-group="${escapeHtml(g.label)}" id="rg_${escapeHtml(g.label)}">`;
      g.options.forEach(opt => {
        const sel = currentRadioGroupAnswer[g.label] === opt ? ' selected' : '';
        html += `<button class="option-btn${sel}" data-value="${escapeHtml(opt)}" data-group="${escapeHtml(g.label)}">
          <span class="option-radio"></span>${opt}
        </button>`;
      });
      html += '</div></div>';
    });

  } else if (q.type === 'child-info') {
    html += '<div style="display:flex;flex-direction:column;gap:10px">';
    ['男孩', '女孩'].forEach((label, i) => {
      html += `<div style="display:flex;align-items:center;gap:8px">
        <span style="width:40px;font-size:14px;font-weight:500">${label}</span>
        <input class="text-input child-name" data-idx="${i}" placeholder="姓名" style="flex:1" value="${escapeHtml(currentChildInfo[i]?.name || '')}">
        <input class="text-input child-age" data-idx="${i}" placeholder="年龄" style="width:80px" value="${escapeHtml(currentChildInfo[i]?.age || '')}">
      </div>`;
    });
    html += '</div>';
  }

  html += '<div class="btn-row">';
  if (idx > 0) {
    html += '<button class="btn btn-secondary" id="prevBtn">← 上一题</button>';
  } else {
    html += '<span></span>';
  }
  html += `<button class="btn btn-primary" id="nextBtn">${isLast ? '完成 ✓' : '下一题 →'}</button>`;
  html += '</div></div>';

  container.innerHTML = html;

  attachListeners(q, idx, isLast);
}

function attachListeners(q, idx, isLast) {
  // Navigation buttons
  document.getElementById('nextBtn').addEventListener('click', () => nextQuestion());
  const prevBtn = document.getElementById('prevBtn');
  if (prevBtn) prevBtn.addEventListener('click', () => prevQuestion());

  // Option buttons (radio, checkbox, prefix) — update DOM in-place
  document.querySelectorAll('#optList .option-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const val = this.dataset.value;
      const parent = this.parentElement;
      const isCheckbox = this.querySelector('.option-check');

      if (isCheckbox) {
        if (currentMultiAnswer.includes(val)) {
          currentMultiAnswer = currentMultiAnswer.filter(v => v !== val);
          this.classList.remove('selected');
        } else {
          currentMultiAnswer.push(val);
          this.classList.add('selected');
        }
      } else {
        currentAnswer = val;
        parent.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
        handleExtraInput(q, val);
      }
      saveCurrentAnswer(q);
    });
  });

  // Prefix buttons (inside #prefixList)
  document.querySelectorAll('#prefixList .option-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const val = this.dataset.value;
      currentPrefixAnswer = val;
      const parent = this.parentElement;
      parent.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      this.classList.add('selected');
      saveCurrentAnswer(q);
    });
  });

  // Radio group buttons
  document.querySelectorAll('[data-group]').forEach(btn => {
    btn.addEventListener('click', function() {
      const group = this.dataset.group;
      const val = this.dataset.value;
      currentRadioGroupAnswer[group] = val;
      const groupContainer = document.getElementById('rg_' + escapeHtml(group));
      if (groupContainer) {
        groupContainer.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      }
      this.classList.add('selected');
      saveCurrentAnswer(q);
    });
  });

  // Text input
  const textInput = document.getElementById('textInput');
  if (textInput) {
    textInput.addEventListener('input', () => {
      currentTextAnswer = textInput.value;
      saveCurrentAnswer(q);
    });
    textInput.focus();
    textInput.setSelectionRange(textInput.value.length, textInput.value.length);
  }

  // Extra input
  const extraInput = document.getElementById('extraInput');
  if (extraInput) {
    extraInput.addEventListener('input', () => {
      currentExtraText = extraInput.value;
      saveCurrentAnswer(q);
    });
  }

  // Multi-text fields
  document.querySelectorAll('.field-input').forEach(inp => {
    inp.addEventListener('input', () => {
      currentMultiTextAnswer[inp.dataset.key] = inp.value;
      saveCurrentAnswer(q);
    });
  });

  // Child info
  document.querySelectorAll('.child-name').forEach(inp => {
    const i = parseInt(inp.dataset.idx);
    if (!currentChildInfo[i]) currentChildInfo[i] = { name: '', age: '' };
    inp.addEventListener('input', () => { currentChildInfo[i].name = inp.value; saveCurrentAnswer(q); });
  });
  document.querySelectorAll('.child-age').forEach(inp => {
    const i = parseInt(inp.dataset.idx);
    if (!currentChildInfo[i]) currentChildInfo[i] = { name: '', age: '' };
    inp.addEventListener('input', () => { currentChildInfo[i].age = inp.value; saveCurrentAnswer(q); });
  });

  // Keyboard: Enter to advance
  document.querySelector('.question-card').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
      e.preventDefault();
      document.getElementById('nextBtn').click();
    }
  });
}

function handleExtraInput(q, val) {
  const extraSlot = document.getElementById('extraSlot');
  const existingExtra = document.getElementById('extraInput');

  const shouldShow = q.hasExtra && val && val !== '否' && val !== '没有' && val !== '暂时没有' && val !== '不需要';
  const shouldShowChoice = q.type === 'choice-text' && val === '期房';

  if (shouldShow || shouldShowChoice) {
    if (!existingExtra) {
      const label = q.extraPlaceholder || q.textLabel || '请说明';
      const inp = document.createElement('input');
      inp.className = 'text-input';
      inp.id = 'extraInput';
      inp.style.marginTop = '12px';
      inp.placeholder = label;
      inp.value = currentExtraText;
      inp.addEventListener('input', () => {
        currentExtraText = inp.value;
        saveCurrentAnswer(q);
      });
      if (extraSlot) {
        extraSlot.replaceWith(inp);
      } else {
        const optList = document.getElementById('optList');
        if (optList) optList.after(inp);
      }
    }
  } else {
    if (existingExtra) {
      currentExtraText = '';
      const slot = document.createElement('div');
      slot.id = 'extraSlot';
      existingExtra.replaceWith(slot);
    }
  }
}

function updateNextButton(q) {
  const btn = document.getElementById('nextBtn');
  if (!btn) return;
  let hasAnswer = false;
  if (q.type === 'checkbox') hasAnswer = currentMultiAnswer.length > 0 || currentExtraText.length > 0;
  else if (q.type === 'text') hasAnswer = currentTextAnswer.length > 0;
  else if (q.type === 'multi-text') hasAnswer = Object.values(currentMultiTextAnswer).some(v => v.length > 0);
  else if (q.type === 'radio-group') hasAnswer = Object.keys(currentRadioGroupAnswer).length > 0;
  else if (q.type === 'child-info') hasAnswer = currentChildInfo.length > 0;
  else if (q.type === 'choice-text') hasAnswer = currentAnswer !== null;
  else hasAnswer = currentAnswer !== null;
  // Allow skip: don't disable, just let user proceed
}

// ===== NAVIGATION FUNCTIONS =====
function nextQuestion() {
  const q = allQuestions[currentQuestionIdx];
  saveCurrentAnswer(q);

  if (currentQuestionIdx >= allQuestions.length - 1) {
    showCompletion();
    return;
  }

  currentQuestionIdx++;
  clearAnswerState();
  showSectionLabel();
  updateProgress();
  renderQuestion(allQuestions[currentQuestionIdx], currentQuestionIdx, true);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevQuestion() {
  if (currentQuestionIdx <= 0) return;
  const q = allQuestions[currentQuestionIdx];
  saveCurrentAnswer(q);
  currentQuestionIdx--;
  clearAnswerState();
  showSectionLabel();
  updateProgress();
  renderQuestion(allQuestions[currentQuestionIdx], currentQuestionIdx, true);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== COMPLETION =====
function showCompletion() {
  updateProgress();
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = '100%';
  document.getElementById('sectionLabel').textContent = '完成';

  const container = document.getElementById('mainContainer');

  let summary = '';
  sections.forEach(s => {
    if (!s.questions) return;
    let hasContent = false;
    let sectionHtml = `<h4>${s.title}</h4>`;
    s.questions.forEach(q => {
      const ans = answers[q.id];
      if (!ans || (Array.isArray(ans) && ans.length === 0) || (typeof ans === 'object' && Object.keys(ans).length === 0 && !answers[q.id + '__extra'])) return;
      hasContent = true;
      let ansText = '';
      if (q.type === 'checkbox') {
        ansText = Array.isArray(ans) ? ans.join('、') : '';
        if (answers[q.id + '__extra']) ansText += (ansText ? '；' : '') + answers[q.id + '__extra'];
      } else if (q.type === 'multi-text') {
        ansText = Object.entries(ans).map(([k, v]) => `${(q.fields||[]).find(f=>f.key===k)?.label||k}: ${v}`).join('；');
      } else if (q.type === 'radio-group') {
        ansText = Object.entries(ans).map(([k, v]) => `${k}: ${v}`).join('；');
      } else if (q.type === 'child-info') {
        ansText = ans.filter(c => c.name || c.age).map(c => `${c.name}(${c.age}岁)`).join('、');
      } else if (q.type === 'choice-text') {
        ansText = `${ans.choice || ''}`;
        if (ans.text) ansText += ` — ${ans.text}`;
      } else if (q.type === 'text') {
        let prefix = answers[q.id + '__prefix'] ? answers[q.id + '__prefix'] + ' ' : '';
        ansText = prefix + ans;
      } else {
        ansText = String(ans);
        if (answers[q.id + '__extra']) ansText += '；' + answers[q.id + '__extra'];
      }
      sectionHtml += `<p><strong>${q.title}</strong>：${ansText}</p>`;
    });
    if (hasContent) summary += sectionHtml;
  });

  const emptyAnswers = allQuestions.filter(q => {
    const ans = answers[q.id];
    return !ans || (Array.isArray(ans) && ans.length === 0) || (typeof ans === 'object' && Object.keys(ans).length === 0);
  });

  const answeredCount = allQuestions.length - emptyAnswers.length;

  container.innerHTML = `
    <div class="question-card completion-card">
      <div class="completion-icon">🎉</div>
      <div class="completion-title">需求问卷已完成！</div>
      <div class="completion-text">
        您已回答了 <strong>${answeredCount}</strong> / ${allQuestions.length} 道问题<br>
        下方可预览结果，提交后将发送至设计工作室。
      </div>
      <div class="summary-section" id="summaryPreview">${summary}</div>

      <div id="submitSection" style="margin-top:24px;padding-top:24px;border-top:1px solid var(--border);text-align:left">
        <h4 style="font-size:16px;font-weight:600;margin-bottom:8px;color:var(--text)">提交需求到设计工作室</h4>
        <p style="font-size:13px;color:var(--text-light);margin-bottom:16px">提交后我们将尽快与您联系，沟通设计方案。</p>
        <div style="display:flex;flex-direction:column;gap:12px">
          <input class="text-input" id="clientName" placeholder="您的称呼 *" required>
          <input class="text-input" id="clientPhone" placeholder="手机号 / 微信号 *" required>
          <input class="text-input" id="clientEmail" placeholder="电子邮箱（选填）">
          <input class="text-input" id="clientNote" placeholder="其他补充说明（选填）">
        </div>
        <div style="margin-top:16px;display:flex;flex-direction:column;gap:10px">
          <button class="btn btn-primary" id="submitBtn" onclick="submitResults()" style="width:100%">
            提交到设计工作室
          </button>
          <button class="btn btn-secondary" onclick="resetQuestionnaire()" style="width:100%">
            重新填写
          </button>
        </div>
        <p id="submitStatus" style="margin-top:12px;font-size:13px;text-align:center"></p>
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);text-align:center">
          <p style="font-size:12px;color:var(--text-light)">或直接联系设计师</p>
          <p style="font-size:14px;color:var(--accent);font-weight:500;margin-top:4px">微信：18627994636</p>
        </div>
      </div>
    </div>
  `;
}

function resetQuestionnaire() {
  currentQuestionIdx = 0;
  currentAnswer = null;
  currentMultiAnswer = [];
  currentTextAnswer = '';
  currentMultiTextAnswer = {};
  currentPrefixAnswer = '';
  currentChildInfo = [];
  currentExtraText = '';
  currentRadioGroupAnswer = {};
  answers = {};
  showWelcome();
}

// ===== SUBMIT RESULTS =====
// 使用 Web3Forms (web3forms.com) 免费服务发送邮件
// 请将下面的 ACCESS_KEY 替换为你自己的 key：
//   1. 打开 https://web3forms.com
//   2. 输入你的邮箱 → 点击 "Get Access Key"
//   3. 将收到的 Access Key 替换下面这行
const WEB3FORMS_KEY = 'c1bf9d3b-8b77-47ec-aae3-3f44754f35ae';

function submitResults() {
  const clientName = document.getElementById('clientName').value.trim();
  const clientPhone = document.getElementById('clientPhone').value.trim();
  const clientEmail = document.getElementById('clientEmail').value.trim();
  const clientNote = document.getElementById('clientNote').value.trim();
  const statusEl = document.getElementById('submitStatus');
  const submitBtn = document.getElementById('submitBtn');

  if (!clientName || !clientPhone) {
    statusEl.innerHTML = '<span style="color:#e74c3c">请至少填写称呼和手机号/微信号</span>';
    return;
  }

  if (WEB3FORMS_KEY === 'YOUR_ACCESS_KEY_HERE') {
    statusEl.innerHTML = '<span style="color:#e74c3c">网站尚未配置邮件接收，请联系设计师。微信：18627994636</span>';
    return;
  }

  // 构建邮件正文
  let bodyText = `客户称呼：${clientName}\n联系方式：${clientPhone}`;
  if (clientEmail) bodyText += `\n电子邮箱：${clientEmail}`;
  if (clientNote) bodyText += `\n补充说明：${clientNote}`;
  bodyText += `\n\n===== 需求问卷详细结果 =====\n\n`;
  bodyText += formatAnswersForEmail();
  bodyText += `\n\n提交时间：${new Date().toLocaleString('zh-CN')}`;

  submitBtn.disabled = true;
  submitBtn.textContent = '正在提交...';
  statusEl.innerHTML = '<span style="color:var(--text-light)">正在发送...</span>';

  fetch('https://api.web3forms.com/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      access_key: WEB3FORMS_KEY,
      subject: `【室内设计需求】${clientName} - ${clientPhone}`,
      from_name: '设计需求问卷系统',
      name: clientName,
      email: clientEmail || 'no-reply@questionnaire.local',
      message: bodyText,
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      statusEl.innerHTML = '<span style="color:#27ae60">✓ 提交成功！我们会尽快与您联系。</span>';
      submitBtn.textContent = '已提交';
    } else {
      throw new Error(data.message || '提交失败');
    }
  })
  .catch(err => {
    statusEl.innerHTML = '<span style="color:#e74c3c">提交失败，请截图结果页面发送至设计师微信：18627994636</span>';
    submitBtn.disabled = false;
    submitBtn.textContent = '重新提交';
  });
}

function formatAnswersForEmail() {
  let text = '';
  sections.forEach(s => {
    if (!s.questions) return;
    let hasContent = false;
    let sectionText = `【${s.title}】\n`;
    s.questions.forEach(q => {
      const ans = answers[q.id];
      if (!ans || (Array.isArray(ans) && ans.length === 0) || (typeof ans === 'object' && Object.keys(ans).length === 0 && !answers[q.id + '__extra'])) return;
      hasContent = true;
      let ansText = '';
      if (q.type === 'checkbox') {
        ansText = Array.isArray(ans) ? ans.join('、') : '';
        if (answers[q.id + '__extra']) ansText += (ansText ? '；' : '') + answers[q.id + '__extra'];
      } else if (q.type === 'multi-text') {
        ansText = Object.entries(ans).map(([k, v]) => `${(q.fields||[]).find(f=>f.key===k)?.label||k}: ${v}`).join('；');
      } else if (q.type === 'radio-group') {
        ansText = Object.entries(ans).map(([k, v]) => `${k}: ${v}`).join('；');
      } else if (q.type === 'child-info') {
        ansText = ans.filter(c => c.name || c.age).map(c => `${c.name}(${c.age}岁)`).join('、');
      } else if (q.type === 'choice-text') {
        ansText = `${ans.choice || ''}`;
        if (ans.text) ansText += ` — ${ans.text}`;
      } else if (q.type === 'text') {
        let prefix = answers[q.id + '__prefix'] ? answers[q.id + '__prefix'] + ' ' : '';
        ansText = prefix + ans;
      } else {
        ansText = String(ans);
        if (answers[q.id + '__extra']) ansText += '；' + answers[q.id + '__extra'];
      }
      sectionText += `  ${q.title}：${ansText}\n`;
    });
    if (hasContent) text += sectionText;
  });
  return text;
}

    <div class="question-card welcome-card">
      <img src="logo2.png" alt="张岭设计工作室" style="display:block;max-width:280px;width:100%;height:auto;margin:0 auto 20px;">
      <div class="welcome-tagline">
        每一个住宅的属性都是独一无二，不可复制的<br>

function startQuestionnaire() {
  currentQuestionIdx = 0;
  clearAnswerState();
  answers = {};
  showProgress();
  showSectionLabel();
  updateProgress();
  renderQuestion(allQuestions[0], 0, true);
}

// ===== UTILS =====
function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ===== KEYBOARD SUPPORT =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const nextBtn = document.getElementById('nextBtn');
    if (nextBtn && document.activeElement !== document.getElementById('textInput') && document.activeElement !== document.getElementById('extraInput') && !document.activeElement?.classList.contains('field-input') && !document.activeElement?.classList.contains('child-name') && !document.activeElement?.classList.contains('child-age')) {
      e.preventDefault();
      nextBtn.click();
    }
  }
  if (e.key === 'ArrowLeft' && e.ctrlKey) {
    e.preventDefault();
    prevQuestion();
  }
  if (e.key === 'ArrowRight' && e.ctrlKey) {
    e.preventDefault();
    nextQuestion();
  }
});

// ===== INIT =====
showWelcome();
</script>
